name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Vitest + Deno
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest (unit + route tests)
        run: npm test

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno (agent-runner edge function tests)
        run: npm run test:deno
